<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrackFolio — Reimposta password</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0b0e;color:#f1f5f9;font-family:'Inter',sans-serif;min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#12141a;border:1px solid #22273a;border-radius:12px;padding:28px;width:100%;max-width:340px}
    .logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;
      background:linear-gradient(135deg,#3b82f6,#06b6d4);-webkit-background-clip:text;
      -webkit-text-fill-color:transparent;margin-bottom:20px}
    .title{font-size:14px;font-weight:600;color:#f1f5f9;margin-bottom:16px}
    input{width:100%;background:#0a0b0e;border:1px solid #22273a;border-radius:6px;
      padding:10px 12px;color:#f1f5f9;font-family:'JetBrains Mono',monospace;font-size:14px;
      outline:none;margin-bottom:10px}
    input:focus{border-color:#3b82f6}
    button{width:100%;background:#3b82f6;color:#fff;border:none;border-radius:6px;
      padding:10px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
      cursor:pointer;margin-top:4px}
    button:disabled{opacity:0.6;cursor:not-allowed}
    .msg{font-size:12px;margin-top:10px;font-family:'JetBrains Mono',monospace;text-align:center}
    .err{color:#ef4444}.ok{color:#22c55e}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">TrackFolio</div>
    <div class="title">Reimposta password</div>
    <input type="password" id="pwd" placeholder="Nuova password (min. 6 caratteri)" autocomplete="new-password"/>
    <input type="password" id="pwd2" placeholder="Conferma password" autocomplete="new-password"/>
    <button id="btn" onclick="doReset()">Salva nuova password</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SB_URL  = "https://csyyrbkbgyjyztkjtbrm.supabase.co";
    const SB_ANON = "sb_publishable_jRMF0ukDp5_IGoYkhjng3g_j5-C0_10";
    const sb = supabase.createClient(SB_URL, SB_ANON, {
      auth: { persistSession: true, detectSessionInUrl: true }
    });

    const msg = document.getElementById("msg");
    const btn = document.getElementById("btn");

    // Verifica che ci sia un token valido nell'URL
    sb.auth.getSession().then(({data:{session}}) => {
      if (!session) {
        msg.className = "msg err";
        msg.textContent = "Link non valido o scaduto. Richiedi un nuovo link.";
        btn.disabled = true;
      }
    });

    async function doReset() {
      const pwd  = document.getElementById("pwd").value;
      const pwd2 = document.getElementById("pwd2").value;
      msg.textContent = "";
      if (pwd.length < 6) { msg.className="msg err"; msg.textContent="Minimo 6 caratteri."; return; }
      if (pwd !== pwd2)  { msg.className="msg err"; msg.textContent="Le password non corrispondono."; return; }
      btn.disabled = true;
      btn.textContent = "Salvataggio...";
      const { error } = await sb.auth.updateUser({ password: pwd });
      if (error) {
        msg.className = "msg err";
        msg.textContent = error.message;
        btn.disabled = false;
        btn.textContent = "Salva nuova password";
      } else {
        msg.className = "msg ok";
        msg.textContent = "✓ Password aggiornata! Reindirizzamento...";
        await sb.auth.signOut();
        setTimeout(() => { window.location.href = "/"; }, 1500);
      }
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") doReset();
    });
  </script>
</body>
</html>
